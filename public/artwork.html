<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MudrArt | Artwork Details</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="/favicon.ico" />
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #fafafa; margin: 0; }
    header { background: #333; padding: 12px; text-align: center; }
    header a { color: white; text-decoration: none; margin: 0 10px; font-weight: bold; }
    header a:hover { text-decoration: underline; }
    .art-container { max-width: 900px; margin: 30px auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .main-image { width: 100%; max-height: 420px; object-fit: contain; border-radius: 8px; }
    .details { margin-top: 20px; }
    .details h2 { margin: 10px 0; font-size: 26px; }
    .details p { margin: 6px 0; font-size: 16px; }
    .price { font-size: 22px; font-weight: bold; color: #222; margin: 10px 0; }
    .stock { color: green; font-weight: bold; }
    .gallery { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
    .gallery img { width: 120px; height: 120px; object-fit: cover; border-radius: 6px; border: 1px solid #ddd; }
    .videos { margin-top: 20px; }
    .videos video { width: 100%; max-height: 400px; border-radius: 6px; margin-bottom: 15px; }
    .back { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #333; font-weight: bold; }
    .back:hover { text-decoration: underline; }

    .order-btn, .email-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      border-radius: 6px;
      text-decoration: none;
      transition: 0.3s;
    }
    .order-btn { background: #25D366; }
    .order-btn:hover { background: #1da851; }
    .email-btn { background: #2b6cb0; margin-left: 12px; }
    .email-btn:hover { background: #225a97; }

    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:999; }
    .modal.open { display:flex; }
    .modal-card { width:95%; max-width:520px; background:#fff; border-radius:10px; padding:20px; }
    .modal-card h3 { margin-top:0; }
    .form-row { display:flex; gap:10px; }
    .form-row > div { flex:1; }
    input[type="text"], input[type="email"], textarea { width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; }
    textarea { min-height:120px; resize:vertical; }
    .modal-actions { display:flex; justify-content:flex-end; gap:10px; margin-top:12px; }
    .btn { padding:10px 16px; border:none; border-radius:6px; cursor:pointer; }
    .btn.secondary { background:#eee; }
    .btn.primary { background:#2b6cb0; color:#fff; }
    .success { color:green; font-weight:bold; margin-top:10px; }
    .error { color:crimson; font-weight:bold; margin-top:10px; }
  </style>
</head>
<body>
  <header>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="wishlist.html">Wishlist ❤️</a>
    <a href="cart.html">Cart 🛒</a>
  </header>

  <a href="index.html" class="back">⬅ Back to Home</a>
  <div class="art-container" id="artDetails">Loading artwork...</div>

  <!-- Email Modal -->
  <div id="emailModal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <h3>Contact via Email</h3>
      <form id="emailForm" enctype="multipart/form-data">
        <div class="form-row">
          <div>
            <label>Your Name *</label>
            <input type="text" name="name" id="c_name" required />
          </div>
          <div>
            <label>Your Email *</label>
            <input type="email" name="email" id="c_email" required />
          </div>
        </div>
        <div>
          <label>Subject *</label>
          <input type="text" name="subject" id="c_subject" required />
        </div>
        <div>
          <label>Message *</label>
          <textarea name="message" id="c_message" placeholder="Write your message..." required></textarea>
        </div>
        <div>
          <label>Attachments (optional, up to 3)</label>
          <input type="file" name="attachments" id="c_files" multiple accept="image/*,application/pdf" />
          <small>Max 10MB per file.</small>
        </div>
        <input type="hidden" name="artworkId" id="c_artworkId" />
        <input type="hidden" name="artworkTitle" id="c_artworkTitle" />

        <div class="modal-actions">
          <button type="button" class="btn secondary" id="closeModalBtn">Cancel</button>
          <button type="submit" class="btn primary">Send Email</button>
        </div>
        <div id="emailMsg"></div>
      </form>
    </div>
  </div>

  <script>
    // 👉 Change to your real WhatsApp number
    const WHATSAPP_NUMBER = "918700000000"; 

    function openEmailModal() {
      document.getElementById("emailModal").classList.add("open");
      document.getElementById("emailModal").setAttribute("aria-hidden", "false");
    }
    function closeEmailModal() {
      document.getElementById("emailModal").classList.remove("open");
      document.getElementById("emailModal").setAttribute("aria-hidden", "true");
    }
    document.getElementById("closeModalBtn").addEventListener("click", closeEmailModal);

     const API_BASE =
      window.location.hostname === "localhost"
        ? "http://localhost:5001"
        : "https://mudrart-admin.onrender.com";

    async function loadArtworkDetails() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");
      if (!id) return;

      try {
        const res = await fetch(`${API_BASE}/api/artworks`);
        const artworks = await res.json();
        const art = artworks.find(a => a._id === id);

        if (!art) {
          document.getElementById("artDetails").innerHTML = "<p>Artwork not found.</p>";
          return;
        }

        const mainImage = art.mainImage
          ? `${API_BASE}${art.mainImage.startsWith('/') ? art.mainImage : '/uploads/' + art.mainImage}`
          : "https://via.placeholder.com/400x300?text=No+Image";

        const additionalImages = (Array.isArray(art.additionalImages) ? art.additionalImages : [])
          .map(img => `<img src="${API_BASE}${img.startsWith('/') ? img : '/uploads/' + img}" alt="">`)
          .join("");

        const videos = (Array.isArray(art.videos) ? art.videos : [])
          .map(v => `<video controls src="${API_BASE}${v.startsWith('/') ? v : '/uploads/' + v}"></video>`)
          .join("");

        document.getElementById("artDetails").innerHTML = `
          <img class="main-image" src="${mainImage}" alt="${art.title}">
          <div class="details">
            <h2>${art.title}</h2>
            <p class="price">₹${art.price}</p>
            <p><strong>Material:</strong> ${art.material || '-'}</p>
            <p><strong>Color Finish:</strong> ${art.colorFinish || '-'}</p>
            <p><strong>Weight:</strong> ${art.weight || '-'} g</p>
            <p><strong>Diameter:</strong> ${art.diameter || '-'} mm</p>
            <p>${art.description || ''}</p>
          </div>
          ${additionalImages ? `<h3>More Images</h3><div class="gallery">${additionalImages}</div>` : ""}
          ${videos ? `<h3>Videos</h3><div class="videos">${videos}</div>` : ""}
        `;
      } catch (err) {
        console.error("Error loading artwork:", err);
      }
    }

    // 📧 Email inquiry submit
    document.getElementById("emailForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const msg = document.getElementById("emailMsg");
      msg.textContent = "Sending...";
      msg.className = "";

      try {
        const fd = new FormData(e.target);
        const res = await fetch("https://mudrart-admin.onrender.com/api/inquiries", {
          method: "POST",
          body: fd
        });
        const data = await res.json();
        if (data.success) {
          msg.textContent = "✅ Email sent successfully!";
          msg.className = "success";
          e.target.reset();
          setTimeout(closeEmailModal, 1500);
        } else {
          msg.textContent = "❌ " + (data.error || "Failed to send email");
          msg.className = "error";
        }
      } catch (err) {
        console.error(err);
        msg.textContent = "❌ Server error";
        msg.className = "error";
      }
    });

    // ❤️ Wishlist
    function addToWishlist(id, title, price, image) {
      let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
      if (!wishlist.find(item => item.id === id)) {
        wishlist.push({ id, title, price, image });
        localStorage.setItem("wishlist", JSON.stringify(wishlist));
        alert("❤️ Added to Wishlist!");
      } else {
        alert("Already in Wishlist");
      }
    }

    // 🛒 Cart
    function addToCart(id, title, price, image) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      let item = cart.find(item => item.id === id);
      if (item) item.qty += 1;
      else cart.push({ id, title, price, image, qty: 1 });
      localStorage.setItem("cart", JSON.stringify(cart));
      alert("🛒 Added to Cart!");
    }

    loadArtworkDetails();
  </script>
</body>
</html>
