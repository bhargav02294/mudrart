<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artwork Details - MudrArt</title>
  <style>
    body {
      font-family: "Poppins", sans-serif;
      margin: 0;
      background: #111;
      color: #eee;
    }
    header {
      background: rgba(0,0,0,0.95);
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 10px rgba(255,255,255,0.05);
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: auto;
      padding: 12px 20px;
    }
    .logo {
      font-size: 1.6em;
      font-weight: 700;
      color: #f2f2f2;
    }
    .nav-links a {
      color: #f2f2f2;
      text-decoration: none;
      margin-left: 20px;
      font-weight: 500;
      position: relative;
    }
    .nav-links a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 0;
      height: 2px;
      background: #ffcc00;
      transition: width 0.3s;
    }
    .nav-links a:hover::after { width: 100%; }

    .container {
      max-width: 1000px;
      margin: 50px auto;
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      align-items: flex-start;
      padding: 0 20px;
    }
    .art-image {
      flex: 1 1 45%;
      text-align: center;
    }
    .art-image img {
      width: 100%;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    }
    .art-details {
      flex: 1 1 45%;
    }
    .art-details h1 {
      color: #ffcc00;
      margin-bottom: 15px;
    }
    .art-details p {
      line-height: 1.6;
      color: #ccc;
    }
    .price {
      font-size: 1.4em;
      color: #ffcc00;
      font-weight: bold;
      margin: 20px 0;
    }
    .btn {
      background: #ffcc00;
      color: #111;
      padding: 10px 25px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }
    .btn:hover { background: #ffd633; }

    footer {
      text-align: center;
      background: #000;
      color: #888;
      padding: 20px 10px;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <div class="logo">MudrArt</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="wishlist.html">Wishlist ❤️</a>
        <a href="cart.html">Cart 🛒</a>
      </div>
    </nav>
  </header>

  <div class="container">
    <div class="art-image" id="artImage"></div>
    <div class="art-details" id="artDetails"></div>
  </div>

  <footer>© 2025 MudrArt India — Miniature Coin Paintings</footer>

  <script>
    // same artworks data as index.html
    const artworks = [
      {
        id: 1,
        title: "The Royal Peacock",
        description: "A vivid hand-painted artwork symbolizing royalty and grace. Crafted meticulously on a genuine Indian coin using ultra-fine brushes and acrylic pigments to retain metallic shine.",
        price: 1200,
        img: "https://res.cloudinary.com/demo/image/upload/v1729928772/sample.jpg"
      },
      {
        id: 2,
        title: "Lord Ganesha",
        description: "Blessings of wisdom and prosperity on pure copper coin. Each coin painting is a one-of-a-kind piece created with devotion.",
        price: 1500,
        img: "https://res.cloudinary.com/demo/image/upload/v1729928798/ganesha.png"
      },
      {
        id: 3,
        title: "Radha Krishna Divine Love",
        description: "Miniature painting depicting divine eternal love. Inspired by Indian mythology and vibrant colors of devotion.",
        price: 1800,
        img: "https://res.cloudinary.com/demo/image/upload/v1729928760/krishna.jpg"
      },
      {
        id: 4,
        title: "Shiva Trident Power",
        description: "Symbol of power, courage, and devotion to Lord Shiva. Crafted with metallic tones to reflect divine strength.",
        price: 1400,
        img: "https://res.cloudinary.com/demo/image/upload/v1729928750/shiva.png"
      },
      {
        id: 5,
        title: "Indian Lotus",
        description: "National flower painted on silver coin. Represents purity, enlightenment, and beauty emerging from darkness.",
        price: 1300,
        img: "https://res.cloudinary.com/demo/image/upload/v1729928740/lotus.jpg"
      }
    ];

    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get("id"));
    const artwork = artworks.find(a => a.id === id);

    if (artwork) {
      document.getElementById("artImage").innerHTML = `<img src="${artwork.img}" alt="${artwork.title}">`;
      document.getElementById("artDetails").innerHTML = `
        <h1>${artwork.title}</h1>
        <p>${artwork.description}</p>
        <div class="price">Price: ₹${artwork.price}</div>
        <a href="#" class="btn">Add to Cart 🛒</a>
      `;
    } else {
      document.querySelector(".container").innerHTML = "<h2>Artwork not found</h2>";
    }
  </script>
</body>
</html>
